<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/app.js"></script>
  </head>
  <body>
    <nav class="nav">
      <ul class="nav__list">
        <li>
          <a href="#leaderboard" class="nav__link active-link">
            <i class="ri-medal-line"></i>
          </a>
        </li>

        <li>
          <a href="#learn" class="nav__link">
            <i class="ri-mind-map"></i>
          </a>
        </li>

        <li>
          <a href="#questions" class="nav__link">
            <i class="ri-questionnaire-line"></i>
          </a>
        </li>

        <li>
          <a href="#profile" class="nav__link">
            <i class="ri-user-line"></i>
          </a>
        </li>
      </ul>
    </nav>

    <main class="container">
      <section class="section" id="leaderboard">
        <h1>Leaderboard</h1>
        <table>
          <thead>
            <th>Name</th>
            <th>Target uni</th>
            <th>Weekly score</th>
          </thead>

          <tbody id="leaderboard-data"></tbody>
        </table>
      </section>

      <section class="section active-section" id="learn">
        <h1>Learn</h1>
        <p class="temp-description">
          This is where students will choose their topic
        </p>
      </section>

      <section class="section" id="questions">
        <h1>Questions</h1>
        <p class="temp-description">Sets of practice questions will go here</p>
      </section>

      <section class="section" id="profile">
        <h1>Profile</h1>
      </section>
    </main>
  </body>
</html>
